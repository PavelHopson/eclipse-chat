name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate -w @eclipse-chat/server

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -w @eclipse-chat/server
