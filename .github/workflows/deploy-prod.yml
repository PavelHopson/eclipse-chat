name: Deploy PROD (master)

# Триггеры:
#   - push в master → автоматически валидирует и деплоит
#   - workflow_dispatch → ручной запуск из GitHub UI (с опциональным initial-setup
#     для первого деплоя на свежий сервер)
#
# v1.1.19: paths-ignore — docs-only коммиты (ROADMAP.md, docs/**, *.md)
# НЕ триггерят деплой. Раньше после каждого release'а ROADMAP-коммит
# запускал лишний workflow, который приходилось вручную отменять
# (`gh run cancel`) → красные "cancelled" checks в истории, путали.
# paths-ignore matches когда ВСЕ изменённые файлы попадают под паттерн —
# смешанный code+md коммит всё равно триггерит деплой.
on:
  push:
    branches: ["master"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
      # Десктоп (Tauri) деплоится отдельно — релизы через тег desktop-v*
      # (.github/workflows/desktop-release.yml), НЕ через прод-пайплайн EC.
      # Поэтому desktop-only коммиты не должны дёргать редеплой web/server.
      - "apps/desktop/**"
  workflow_dispatch:
    inputs:
      run_initial_setup:
        description: "Run deploy/initial-setup.sh on server (only first time)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# Concurrency: не дать двум deploy'ям бежать одновременно. Если в очереди уже
# есть deploy — новый встаёт следом, не отменяя предыдущий (cancel-in-progress=false).
concurrency:
  group: eclipse-chat-prod-deploy
  cancel-in-progress: false

jobs:
  # ============================================================
  # 1. Validate — CI gate: TypeScript + production build должны пройти,
  #    иначе deploy не запустится. Защищает от broken master.
  # ============================================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install workspaces
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests (server)
        run: npm test --workspace=@eclipse-chat/server

      - name: Production build (server + web)
        run: npm run build
        env:
          VITE_BASE_PATH: "/eclipse-chat/"

  # ============================================================
  # 2. Deploy — SSH в prod, запускает deploy/scripts/deploy.sh.
  #    Все шаги (git pull → build → migrate → nginx sync → restart → smoke)
  #    инкапсулированы в orchestrator на проде. CI-job только SSH'итин.
  # ============================================================
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production # требует manual approval в GitHub UI
    steps:
      - uses: actions/checkout@v5

      # --- Optional: первый деплой на свежий сервер ---
      # Запускается только при workflow_dispatch с run_initial_setup=true.
      # Создаёт PG БД, .env, supervisor program, nginx snippets с нуля.
      - name: Run initial setup (first deploy only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_initial_setup == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST_PROD }}
          username: ${{ secrets.DEPLOY_USER_PROD }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          envs: ECLIPSE_CHAT_DB_PASSWORD,ECLIPSE_CHAT_JWT_SECRET
          script: |
            set -e
            DEPLOY_PATH="/var/www/eclipse-chat"
            if [ ! -d "$DEPLOY_PATH/deploy" ]; then
              if [ ! -d "$DEPLOY_PATH" ]; then
                sudo mkdir -p "$DEPLOY_PATH"
                sudo chown -R "$USER:$USER" "$DEPLOY_PATH"
              fi
              cd "$DEPLOY_PATH"
              git clone https://github.com/PavelHopson/eclipse-chat.git . || true
              git fetch origin master && git reset --hard origin/master
            fi
            bash "$DEPLOY_PATH/deploy/initial-setup.sh"
        env:
          ECLIPSE_CHAT_DB_PASSWORD: ${{ secrets.ECLIPSE_CHAT_DB_PASSWORD }}
          ECLIPSE_CHAT_JWT_SECRET: ${{ secrets.ECLIPSE_CHAT_JWT_SECRET }}

      # --- Регулярный деплой: orchestrator deploy.sh делает всё ---
      # Workflow сам делает git pull перед bash deploy.sh — иначе chicken-egg:
      # если на проде старый commit без deploy/scripts/, файл просто не существует.
      # После initial pull deploy.sh сам делает второй reset --hard как [1/10] step
      # (идемпотентно, harmless).
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST_PROD }}
          username: ${{ secrets.DEPLOY_USER_PROD }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/eclipse-chat
            echo "==> Pre-pull (workflow bootstrap, до deploy.sh)"
            git fetch origin master
            git reset --hard origin/master
            echo "==> Running deploy/scripts/deploy.sh"
            bash deploy/scripts/deploy.sh

      # --- Post-deploy: independent smoke от CI runner (не из prod),
      #     чтобы убедиться что внешний пользователь видит работающий сервис ---
      - name: External smoke (from CI runner)
        run: |
          set -e
          BASE="https://app.star-crm.ru/eclipse-chat"

          echo "→ /api/version"
          curl -sf --max-time 10 "$BASE/api/version" | tee /tmp/version.json
          grep -q '"version"' /tmp/version.json

          echo ""
          echo "→ /api/health"
          curl -sf --max-time 10 "$BASE/api/health" | tee /tmp/health.json
          grep -q '"ok":true' /tmp/health.json
          grep -q '"database":true' /tmp/health.json

          echo ""
          echo "→ frontend index.html"
          curl -sI --max-time 10 "$BASE/" | grep -i '^content-type:.*text/html'

          echo ""
          echo "✓ Eclipse Chat live на $BASE/"
