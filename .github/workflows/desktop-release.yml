name: Desktop Release

# Собирает desktop-установщики (Windows / macOS / Linux) при push тега
# `desktop-v*`, собирает подписанные updater-артефакты и автоматически публикует
# GitHub Release только после успешной сборки всех платформ.
# Не триггерится на обычные коммиты в master — только на desktop-теги.
#
# Релиз: `git tag desktop-v1.0.5 && git push origin desktop-v1.0.5`.
#
# Secrets (Settings → Secrets → Actions), нужны для подписанного auto-updater:
#   TAURI_SIGNING_PRIVATE_KEY           — содержимое ~/.tauri/eclipse-chat-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — пароль keypair (если задавался)
#
# Frontend НЕ собирается: desktop = тонкая обёртка над прод-URL (frontendDist =
# URL в tauri.conf.json, beforeBuildCommand пуст), поэтому шаги web-сборки не
# нужны — только Rust + tauri build.

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles dmg"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
            rust-targets: ""
          - platform: windows-latest
            args: "--bundles nsis,msi"
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Generate icons
        run: tauri icon apps/web/public/icon-512.png -o apps/desktop/src-tauri/icons

      - name: Regenerate Windows installer branding
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./apps/desktop/scripts/generate-installer-assets.ps1

      - name: Build installers + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Eclipse Chat Desktop ${{ github.ref_name }}"
          releaseBody: "Eclipse Chat — десктоп-установщики Windows / macOS / Linux. Update packages подписаны ключом Eclipse Forge и проверяются приложением перед установкой. Windows Authenticode и macOS notarization пока не настроены, поэтому при первой установке ОС может показать предупреждение."
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload stable Windows download aliases
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $setup = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "NSIS installer was not produced" }
          $setupAlias = Join-Path $env:RUNNER_TEMP "eclipse-chat-setup.exe"
          Copy-Item $setup.FullName $setupAlias

          $msi = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/msi" -Filter "*_ru-RU.msi" | Select-Object -First 1
          if (-not $msi) {
            $msi = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          }
          if (-not $msi) { throw "MSI installer was not produced" }
          $msiAlias = Join-Path $env:RUNNER_TEMP "eclipse-chat.msi"
          Copy-Item $msi.FullName $msiAlias

          gh release upload "${{ github.ref_name }}" $setupAlias $msiAlias --repo "${{ github.repository }}" --clobber

      - name: Upload stable macOS download alias
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg="$(find apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg"
          cp "$dmg" "$RUNNER_TEMP/eclipse-chat.dmg"
          gh release upload "${{ github.ref_name }}" "$RUNNER_TEMP/eclipse-chat.dmg" --repo "${{ github.repository }}" --clobber

      - name: Upload stable Linux download aliases
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deb="$(find apps/desktop/src-tauri/target/release/bundle/deb -maxdepth 1 -name '*.deb' -print -quit)"
          appimage="$(find apps/desktop/src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$deb"
          test -n "$appimage"
          cp "$deb" "$RUNNER_TEMP/eclipse-chat.deb"
          cp "$appimage" "$RUNNER_TEMP/eclipse-chat.AppImage"
          gh release upload "${{ github.ref_name }}" "$RUNNER_TEMP/eclipse-chat.deb" "$RUNNER_TEMP/eclipse-chat.AppImage" --repo "${{ github.repository }}" --clobber

  publish:
    name: Publish signed desktop release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release after all platform builds pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest
