name: Desktop Release

# Собирает desktop-установщики (Windows / macOS / Linux) при push тега
# `desktop-v*` и публикует их в DRAFT GitHub Release вместе с updater-манифестом
# `latest.json` (подписанным, если заданы signing-секреты — см. ниже).
# Не триггерится на обычные коммиты в master — только на desktop-теги.
#
# Релиз: `git tag desktop-v1.0.4 && git push origin desktop-v1.0.4`.
#
# Secrets (Settings → Secrets → Actions), нужны для подписанного auto-updater
# (без них установщики всё равно собираются, но `latest.json` без подписи):
#   TAURI_SIGNING_PRIVATE_KEY           — содержимое ~/.tauri/eclipse-chat.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — пароль keypair (если задавался)
# + в tauri.conf.json plugins.updater.pubkey заменить placeholder на публичный
#   ключ (см. apps/desktop/README.md).
#
# Frontend НЕ собирается: desktop = тонкая обёртка над прод-URL (frontendDist =
# URL в tauri.conf.json, beforeBuildCommand пуст), поэтому шаги web-сборки не
# нужны — только Rust + tauri build.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles dmg"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
            rust-targets: ""
          - platform: windows-latest
            args: "--bundles nsis,msi"
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Generate icons
        run: tauri icon apps/web/public/icon-512.png -o apps/desktop/src-tauri/icons

      - name: Build installers + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Eclipse Chat Desktop ${{ github.ref_name }}"
          releaseBody: "Eclipse Chat — десктоп-установщики Windows / macOS / Linux. Unsigned (SmartScreen / Gatekeeper warning) до code-signing (v1.0.5+)."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
