<!doctype html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../../apps/web/src/styles/tokens.css" />
<link rel="stylesheet" href="../../../apps/web/src/styles/clean-ui.css" />
<style>
  body{margin:0;background:var(--ec-void);height:860px;display:flex;font-family:var(--ec-font-sans)}
  .pane{width:244px;height:100%}
  .av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff}
  .a-v{background:linear-gradient(150deg,hsl(258 70% 58%),hsl(258 70% 40%))}.a-t{background:linear-gradient(150deg,hsl(168 55% 48%),hsl(180 50% 34%))}
  .a-b{background:linear-gradient(150deg,hsl(212 60% 56%),hsl(220 55% 40%))}.a-r{background:linear-gradient(150deg,hsl(355 65% 60%),hsl(340 55% 44%))}
  .a-g{background:linear-gradient(150deg,hsl(46 65% 55%),hsl(38 70% 42%))}.a-p{background:linear-gradient(150deg,hsl(288 55% 58%),hsl(300 50% 40%))}.a-o{background:linear-gradient(150deg,hsl(28 80% 58%),hsl(20 70% 44%))}
  .on{background:var(--ec-presence-online)}.off{background:var(--ec-presence-offline)}
</style></head>
<body>
<aside class="ec-mem pane">
  <header class="ec-mem__hd"><span class="ec-mem__hd-title">Участники</span><span class="ec-mem__hd-count">1/12</span></header>
  <div class="ec-mem__scroll">
    <button class="ec-mem__group"><span class="ec-mem__chev">▾</span>Владелец<span class="ec-mem__group-count">1</span></button>
    <div class="ec-mem-row"><span class="ec-mem-row__av"><span class="av a-o">П</span><span class="ec-mem-row__pres on"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">Павел</span></span><span class="ec-mem-row__role ec-mem-row__role--owner">OWN</span></div>
    <button class="ec-mem__group"><span class="ec-mem__chev">▾</span>Администраторы<span class="ec-mem__group-count">6</span></button>
    <div class="ec-mem-row"><span class="ec-mem-row__av"><span class="av a-b">В</span><span class="ec-mem-row__pres on"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">Василий</span></span><span class="ec-mem-row__role ec-mem-row__role--admin">ADM</span></div>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-p">П</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">Повелитель</span></span><span class="ec-mem-row__role ec-mem-row__role--admin">ADM</span></div>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-g">B</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">BigYtka</span></span><span class="ec-mem-row__role ec-mem-row__role--admin">ADM</span></div>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-t">R</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">Reptail</span></span><span class="ec-mem-row__role ec-mem-row__role--admin">ADM</span></div>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-r">V</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">Victor</span></span><span class="ec-mem-row__role ec-mem-row__role--admin">ADM</span></div>
    <button class="ec-mem__group"><span class="ec-mem__chev">▾</span>Не в сети<span class="ec-mem__group-count">5</span></button>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-v">д</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">данила</span></span></div>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-p">Ц</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">Царь додеп</span></span></div>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-g">c</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">chepokayfu_baby</span></span></div>
    <div class="ec-mem-row ec-mem-row--offline"><span class="ec-mem-row__av"><span class="av a-b">Z</span><span class="ec-mem-row__pres off"></span></span><span class="ec-mem-row__id"><span class="ec-mem-row__name">Zefir</span></span></div>
  </div>
</aside>
