<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Eclipse brand mark: layered void disc + cyan limbus arc.
       Геометрия: deep night-blue disc с тонким cyan «лимбусом» сверху-справа,
       намекающим на eclipse-like edge-light. Калибр под favicon 16-32px. -->
  <rect width="32" height="32" rx="7" fill="#07090D"/>
  <circle cx="16" cy="16" r="9" fill="#0B0F14" stroke="#11161D" stroke-width="0.6"/>
  <!-- Limbus arc: cool sky #5db5d9 -->
  <path d="M 16 7 A 9 9 0 0 1 25 16" stroke="#5db5d9" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Inner highlight dot — крошечная edge-light искра -->
  <circle cx="22" cy="9.5" r="1.2" fill="#9ad8ef"/>
</svg>
