# Eclipse Chat — LiveKit WSS proxy
#
# Включается в существующий `app.star-crm.ru` server block через
# `include /etc/nginx/snippets/eclipse-chat-livekit.conf;` после остальных
# `^~ /eclipse-chat/...` location'ов.
#
# LiveKit slack: signal-канал — WSS на :7880, **media** идёт по UDP
# (7881/7882 + диапазон 50000-50200) напрямую client ↔ LiveKit (нет
# proxy через nginx — UDP не proxy'ится HTTP-сервером).
#
# Поэтому: nginx proxy'ит ТОЛЬКО `wss://app.star-crm.ru/eclipse-chat/livekit`
# → `ws://127.0.0.1:7880` (signal-канал). Media-UDP идёт через открытые
# UFW порты на публичный IP сервера.

location ^~ /eclipse-chat/livekit {
    # rewrite сначала — убираем prefix перед proxy_pass
    rewrite ^/eclipse-chat/livekit(/.*)?$ $1 break;

    proxy_pass http://127.0.0.1:7880;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket long-lived — поднимаем таймауты
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    # Disable buffering для realtime signal traffic
    proxy_buffering off;
}
