# Eclipse Chat — nginx location-блоки для деплоя под-путём
# `https://app.star-crm.ru/eclipse-chat/`.
#
# Включается в существующий server { ... } block для `app.star-crm.ru`
# через `include /etc/nginx/snippets/eclipse-chat.conf;` или копируется
# инлайн в основной site-config.
#
# Установка (initial-setup.sh делает это автоматически):
#   sudo cp deploy/nginx/eclipse-chat.conf /etc/nginx/snippets/
#   и добавляется одной строкой в server-block app.star-crm.ru:
#     include /etc/nginx/snippets/eclipse-chat.conf;

# ---- REST API: /eclipse-chat/api/* → backend :3001/api/* (с rewrite prefix) ----
location /eclipse-chat/api/ {
    rewrite ^/eclipse-chat/(.*) /$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# ---- Socket.io с WebSocket upgrade ----
location /eclipse-chat/socket.io {
    rewrite ^/eclipse-chat/(.*) /$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400; # WebSocket долгоживущий
    proxy_send_timeout 86400;
}

# ---- Static frontend (Vite build output) ----
location /eclipse-chat/ {
    alias /var/www/eclipse-chat/apps/web/dist/;
    index index.html;
    try_files $uri $uri/ /eclipse-chat/index.html;

    # Кеш для ассетов с хэшем в имени файла (Vite добавляет hash суффикс)
    location ~* /eclipse-chat/assets/.*\.(js|css|svg|woff2?|png|jpg|webp)$ {
        alias /var/www/eclipse-chat/apps/web/dist/;
        rewrite ^/eclipse-chat/(.*) /$1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
