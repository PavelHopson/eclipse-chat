# Eclipse Chat — nginx location-блоки для деплоя под-путём
# `https://app.star-crm.ru/eclipse-chat/`.
#
# Используется через `include /etc/nginx/snippets/eclipse-chat.conf;`
# внутри server { app.star-crm.ru } block (port 443).
#
# Модификатор `^~` ставит non-regex location выше regex'ов — гарантирует
# что эти 3 location'а будут match'иться раньше generic `location /`
# для Star CRM SPA fallback. Same pattern как `^~ /romark/`.

# ---- REST API: /eclipse-chat/api/* → backend :3001/api/* (с rewrite prefix) ----
location ^~ /eclipse-chat/api/ {
    rewrite ^/eclipse-chat/(.*) /$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# ---- Socket.io с WebSocket upgrade ----
location ^~ /eclipse-chat/socket.io {
    rewrite ^/eclipse-chat/(.*) /$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400; # WebSocket долгоживущий
    proxy_send_timeout 86400;
}

# ---- Static frontend (Vite build output) ----
# Cache-headers через if (так как nested regex location + alias не работает
# в nginx — "alias cannot be used in location where URI was rewritten").
# Браузер всё равно увидит content-length etag и сделает 304 на повторные.
location ^~ /eclipse-chat/ {
    alias /var/www/eclipse-chat/apps/web/dist/;
    index index.html;
    try_files $uri $uri/ /eclipse-chat/index.html;

    # Vite добавляет hash в имя файла (index-AbCdEf.js) — content-addressed,
    # безопасно кешировать immutable. Применяется через if (a-ля Star CRM
    # стиль для /assets/).
    if ($uri ~* "^/eclipse-chat/assets/.*\.(js|css|svg|woff2?|png|jpg|webp)$") {
        add_header Cache-Control "public, immutable, max-age=31536000";
    }
}
