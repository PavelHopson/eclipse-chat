# Eclipse Chat — nginx location-блоки для деплоя под-путём
# `https://app.star-crm.ru/eclipse-chat/`.
#
# Используется через `include /etc/nginx/snippets/eclipse-chat.conf;`
# внутри server { app.star-crm.ru } block (port 443).
#
# Модификатор `^~` ставит non-regex location выше regex'ов — гарантирует
# что эти location'ы будут match'иться раньше generic `location /`
# для Star CRM SPA fallback. Same pattern как `^~ /romark/`.
#
# Между несколькими `^~` location'ами nginx выбирает **longest prefix
# match**, поэтому /eclipse-chat/uploads/ выигрывает у /eclipse-chat/
# независимо от порядка в файле.

# ---- Trailing-slash редирект: /eclipse-chat → /eclipse-chat/ ----
# Без этого блока запросы без trailing slash не матчат ни один из
# `^~ /eclipse-chat/...` location'ов ниже (они все требуют слэш next)
# и падают в generic `location /` main-сайта star-crm.ru — пользователь
# видит «404 страница не найдена» брендированную под Star CRM, хотя
# Eclipse Chat жив. exact-match (`=`) гарантирует точечность.
location = /eclipse-chat {
    return 301 $scheme://$host/eclipse-chat/;
}

# ---- REST API: /eclipse-chat/api/* → backend :3001/api/* (с rewrite prefix) ----
location ^~ /eclipse-chat/api/ {
    rewrite ^/eclipse-chat/(.*) /$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# ---- Socket.io с WebSocket upgrade ----
location ^~ /eclipse-chat/socket.io {
    rewrite ^/eclipse-chat/(.*) /$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400; # WebSocket долгоживущий
    proxy_send_timeout 86400;
}

# ---- Hashed static assets (Vite `assets/*-[hash].js|.css`) ----
# v1.1.3: long-term immutable cache — assets имеют content-hash в
# filename (cache-busting автоматический: new hash → new URL).
# Longest-prefix match гарантирует что этот location wins над
# generic /eclipse-chat/ для /eclipse-chat/assets/* URLs.
location ^~ /eclipse-chat/assets/ {
    alias /var/www/eclipse-chat/apps/web/dist/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# ---- Static frontend (Vite build output) ----
# NB: nginx `alias` + любая rewrite-related directive (`if`, nested regex
# location) даёт 500 "alias cannot be used where URI was rewritten".
# Поэтому здесь только alias + try_files, без nested location.
#
# v1.1.3: add_header Cache-Control: no-cache применяется ко всем
# файлам в /eclipse-chat/ (index.html, sw.js, manifest.webmanifest,
# favicon.svg, etc) — все они должны быть fresh после deploy, потому
# что index.html ссылается на новые hashed assets, а sw.js хранит
# cache version. Без этого browser агрессивно кэшировал index.html
# и users видели старый bundle hash после deploy.
location ^~ /eclipse-chat/ {
    alias /var/www/eclipse-chat/apps/web/dist/;
    index index.html;
    try_files $uri $uri/ /eclipse-chat/index.html;
    add_header Cache-Control "no-cache, must-revalidate";
    # SW scope разрешён на весь app — registration scope = BASE_URL.
    add_header Service-Worker-Allowed "/eclipse-chat/";
}
client_max_body_size 900m;

# ---- Uploads (avatars / server-icons / server-banners / attachments) ----
# История: без этого блока запросы к /uploads/* падали в SPA fallback
# выше и возвращали index.html с MIME text/html → broken-image в браузере.
# Service Worker кешировал ответы, делая баг особенно зловредным.
#
# WHY no try_files: `try_files $uri =404` в комбинации с alias имеет
# nginx-баг — иногда возвращает SPA fallback вместо 404 (несуществующий
# файл попадает обратно в location /). Без try_files nginx сам отдаёт
# 404 если файла нет — это правильное поведение.
location ^~ /eclipse-chat/uploads/ {
    alias /var/www/eclipse-chat/uploads/;
    add_header Cache-Control "public, max-age=3600";
    autoindex off;
    access_log off;
}
